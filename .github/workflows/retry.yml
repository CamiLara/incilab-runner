name: InciLab Retry Pipeline

on:
  workflow_dispatch:
    inputs:
      skip_ingredients:
        description: 'Omitir retry de ingredientes (incilab_failed.json)'
        type: boolean
        default: false
      skip_fill_empty:
        description: 'Omitir fill_empty (ingredientes con description vacía en DB)'
        type: boolean
        default: false
      skip_reviews:
        description: 'Omitir retry de reviews'
        type: boolean
        default: false
      skip_categories:
        description: 'Omitir retry de categories'
        type: boolean
        default: false
      skip_htu:
        description: 'Omitir generate_htu (how_to_use faltantes)'
        type: boolean
        default: false
      skip_rescore:
        description: 'Omitir rescore final'
        type: boolean
        default: false

permissions:
  contents: read

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  PYTHONUNBUFFERED: "1"

jobs:
  # ── 1. Retry ingredientes fallidos (incilab_failed.json) ─────────────────────
  retry_ingredients:
    if: ${{ !inputs.skip_ingredients }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: retry
        working-directory: repo
        run: python3 incilab_seed.py --task retry --workers 6

      - name: Guardar estado en repo privado
        if: always()
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incilab_failed.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: retry ingredients state [skip ci]"
          git pull --rebase --autostash origin main
          git push

  # ── 2. Fill empty (ingredientes con description_es vacía en DB, sin log) ──────
  fill_empty:
    needs: retry_ingredients
    if: ${{ always() && !inputs.skip_fill_empty }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: fill_empty
        working-directory: repo
        run: python3 incilab_seed.py --task fill_empty --workers 6 --limit 2000

      - name: Guardar estado en repo privado
        if: always()
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incilab_failed.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: fill_empty state [skip ci]"
          git pull --rebase --autostash origin main
          git push

  # ── 3a. Reviews (idempotente — re-procesa solo los que faltan en DB) ──────────
  retry_reviews:
    needs: fill_empty
    if: ${{ always() && !inputs.skip_reviews }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: reviews
        working-directory: repo
        run: python3 incilab_seed.py --task reviews --workers 6

  # ── 3b. Categories (idempotente — rellena solo los NULL en DB) ───────────────
  retry_categories:
    needs: fill_empty
    if: ${{ always() && !inputs.skip_categories }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: categories
        working-directory: repo
        run: python3 incilab_seed.py --task categories --workers 6

  # ── 4. Generate HTU (how_to_use IS NULL AND category IS NOT NULL) ─────────────
  retry_htu:
    needs: [retry_reviews, retry_categories]
    if: ${{ always() && !inputs.skip_htu }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: generate_htu
        working-directory: repo
        run: python3 incilab_seed.py --task generate_htu --workers 6 --limit 2000

  # ── 5. Rescore final ──────────────────────────────────────────────────────────
  rescore:
    needs: [retry_reviews, retry_categories, retry_htu]
    if: ${{ always() && !inputs.skip_rescore }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: rescore_v2
        working-directory: repo
        run: python3 rescore.py --workers 6
