name: InciLab Data Pipeline

on:
  schedule:
    - cron: '0 4 */3 * *'   # cada 3 días a las 4am UTC
  workflow_dispatch:
    inputs:
      skip_discover:
        description: 'Omitir discover_new (INCIDecoder)'
        type: boolean
        default: false
      skip_jolse:
        description: 'Omitir discover_jolse'
        type: boolean
        default: false
      skip_images:
        description: 'Omitir scrape_images'
        type: boolean
        default: false
      skip_enrich:
        description: 'Omitir enriquecimiento (ingredients, reviews, categories)'
        type: boolean
        default: false

permissions:
  contents: read

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  PYTHONUNBUFFERED: "1"

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: discover_new (INCIDecoder)
        if: ${{ !inputs.skip_discover }}
        working-directory: repo
        run: python3 incilab_seed.py --task discover_new --pages 5 --delay 2

      - name: discover_jolse
        if: ${{ !inputs.skip_jolse }}
        working-directory: repo
        run: python3 incilab_seed.py --task discover_jolse --delay 1.5

      - name: scrape_images
        if: ${{ !inputs.skip_images }}
        working-directory: repo
        run: python3 scrape_images.py --delay 1 --workers 2

      - name: Guardar estado en repo privado
        if: always()
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incidecoder_new_seen.json data/jolse_seen.json data/scrape_skip.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update seed state [skip ci]"
          git pull --rebase --autostash origin main
          git push

  enrich_ingredients:
    needs: seed
    if: ${{ !inputs.skip_enrich }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: ingredients
        working-directory: repo
        run: python3 incilab_seed.py --task ingredients --workers 6

      - name: Guardar estado en repo privado
        if: always()
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incilab_failed.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update ingredients state [skip ci]"
          git pull --rebase --autostash origin main
          git push

  enrich_categories:
    needs: seed
    if: ${{ !inputs.skip_enrich }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: categories
        working-directory: repo
        run: python3 incilab_seed.py --task categories --workers 6

  retry_ingredients:
    needs: enrich_ingredients
    if: ${{ !inputs.skip_enrich }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: retry
        working-directory: repo
        run: python3 incilab_seed.py --task retry --workers 6

      - name: Guardar estado en repo privado
        if: always()
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incilab_failed.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: retry ingredients state [skip ci]"
          git pull --rebase --autostash origin main
          git push

  enrich_reviews:
    needs: retry_ingredients
    if: ${{ !inputs.skip_enrich }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: reviews
        working-directory: repo
        run: python3 incilab_seed.py --task reviews --workers 6

      - name: Guardar estado en repo privado
        if: always()
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incilab_failed.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update enrich state [skip ci]"
          git pull --rebase --autostash origin main
          git push

  generate_htu:
    needs: [retry_ingredients, enrich_categories]
    if: ${{ !inputs.skip_enrich }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: generate_htu
        working-directory: repo
        run: python3 incilab_seed.py --task generate_htu --workers 6 --limit 2000

  rescore:
    needs: [enrich_reviews, generate_htu]
    if: ${{ !inputs.skip_enrich }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Strip newlines from secrets
        run: |
          echo "SUPABASE_URL=$(printenv SUPABASE_URL | tr -d '\n\r')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=$(printenv SUPABASE_SERVICE_KEY | tr -d '\n\r')" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=$(printenv OPENROUTER_API_KEY | tr -d '\n\r')" >> $GITHUB_ENV

      - name: rescore v2
        working-directory: repo
        run: python3 rescore.py --workers 6
