name: Seed Ingredients

on:
  schedule:
    - cron: '0 3 * * *'   # diario a las 3am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingredients:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Clone private repo
        run: git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/CamiLara/incilab-enrich.git repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Seed ingredients nuevos
        working-directory: repo
        run: python3 incilab_seed.py --task ingredients

      - name: Rellenar ingredientes sin description_es (400 por run)
        working-directory: repo
        run: python3 incilab_seed.py --task fill_empty --limit 400

      - name: Guardar estado en repo privado
        if: always()
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incilab_failed.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update ingredients failed log [skip ci]"
          git pull --rebase --autostash origin main
          git push
